name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm ci

      - name: Install widget dependencies
        run: npm ci
        working-directory: widgets

      - name: Build pipeline task
        run: |
          npm ci --ignore-scripts
          npx tsc -p .
          npm prune --omit=dev
        working-directory: dependencyReviewTask

      - name: Clean up node_modules before packaging
        run: |
          # remove .bin folder (symlinks/extensionless files cause warnings)
          rm -rf dependencyReviewTask/node_modules/.bin
          # remove SVG files (files only)
          find dependencyReviewTask/node_modules -type f -name "*.svg" -delete
          # remove other problematic file-only types
          find dependencyReviewTask/node_modules -type f \( -name "*.markdown" -o -name "*.cmd" -o -name "*.iml" -o -name "*.bnf" \) -delete
          # remove *.resjson — some are directories (e.g. azure-pipelines-task-lib/Strings/resources.resjson)
          # use rm -rf via xargs so non-empty directories are handled correctly
          find dependencyReviewTask/node_modules -name "*.resjson" -print0 | xargs -0 --no-run-if-empty rm -rf

      - name: Package extension (increment revision)
        run: npx tfx extension create --manifest-globs vss-extension.json --rev-version

      - name: Publish to Azure DevOps Marketplace
        id: publish
        env:
          MARKETPLACE_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
        run: |
          VERSION=$(node -p "require('./vss-extension.json').version")
          VSIX="RobBos.GHAzDoWidget-${VERSION}.vsix"
          echo "Publishing $VSIX"
          npx tfx extension publish --vsix "$VSIX" \
            --service-url https://marketplace.visualstudio.com \
            --token "$MARKETPLACE_TOKEN"
          echo "vsix-file-name=$VSIX" >> "$GITHUB_OUTPUT"

      - name: Print published VSIX
        run: echo "Published ${{ steps.publish.outputs.vsix-file-name }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VSIX="${{ steps.publish.outputs.vsix-file-name }}"
          gh release create "${{ github.ref_name }}" \
            "$VSIX" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
